<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Sign In -Up Page | Valasco </title>
</head>
<body>
    <div class="container">
        <div class="headers">
            <i>Sign In </i>

            <div class="boxes">
                <label for="Email"> <input class="box" type="text" placeholder="Enter your e-mail"> </label>
            </div> 
                
            <div class="boxes">
                <label for="Password" ><input class="box" type="password" placeholder="Your password"></label>

            </div>
            <div >
                <button class="confirm"><i class="fa-solid fa-check"></i></button>
            </div>

            <div class="in_Alternative">
                  sign in with 
                <div class="in_icons">
                    <button class="button"><i class= "fa-brands fa-google"></i></button>
                    <button class="button"><i class= "fa-brands fa-linkedin"></i></button>
                    <button class="button"><i class= "fa-brands fa-github"></i></button>
                    <button class="button"><i class= "fa-brands fa-facebook"></i></button>
                </div>
                
            </div>

            
            

    


        </div>

        <div></div>
        <div class="up">
            <i>Sign up </i>
            <div class="boxes">
                <label for="Email"> <input class="box" type="text" placeholder="Enter your e-mail"> </label>
            </div> 
                
            <div class="boxes">
                <label for="Password" ><input class="box" type="password" placeholder="Enter password"></label>

            </div>
            <div class="boxes">
                 <label for="Password check" ><input class="box" type="password" placeholder="Enter your password again"></label>
            </div>
           
            
            <div >
                <button class="confirm"><i class="fa-solid fa-check"></i></button>
            </div>

            <div class="up_Alternative">
                sign up with 
                <div class="up_icons">
                    <button class="button"><i class= "fa-brands fa-google"></i></button>
                    <button class="button"><i class= "fa-brands fa-linkedin"></i></button>
                    <button class="button"><i class= "fa-brands fa-github"></i></button>
                    <button class="button"><i class= "fa-brands fa-facebook"></i></button>
                </div>
                
            </div>

            
            
        </div>
    </div>
    


    
</body>
</html>
